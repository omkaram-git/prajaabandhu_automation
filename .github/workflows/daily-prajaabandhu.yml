name: Daily Prajaa Bandhu Report

on:
  schedule:
    - cron: '30 14 * * *'  # 8:00 PM IST (14:30 UTC)
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-generativeai pillow twscrape

    - name: Run Civic Data Pipeline
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        X_USERNAME: ${{ secrets.X_USERNAME }}
        X_PASSWORD: ${{ secrets.X_PASSWORD }}
        X_EMAIL: ${{ secrets.X_EMAIL }}
        X_EMAIL_PASSWORD: ${{ secrets.X_EMAIL_PASSWORD }}
        X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
        X_CT0: ${{ secrets.X_CT0 }}
      run: python main.py

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Prajaa Bandhu Bot"
        git add .
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Daily report update $(date +'%Y-%m-%d')"
          git push
        fi